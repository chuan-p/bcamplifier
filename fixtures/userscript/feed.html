<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bandcamplifier Userscript Fixture</title>
    <meta property="og:site_name" content="Bandcamp" />
    <style>
      body {
        margin: 0;
        padding: 32px;
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f3f4f6;
        color: #111827;
      }

      .fixture-shell {
        max-width: 860px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 280px;
        gap: 24px;
      }

      .feed-item {
        list-style: none;
        margin: 0;
        padding: 20px;
        min-height: 220px;
        border: 1px solid #d1d5db;
        border-radius: 18px;
        background: #fff;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }

      .story-title {
        margin-bottom: 14px;
        font-size: 16px;
      }

      .story-title a,
      .item-link,
      .buy-link {
        color: #1d4ed8;
      }

      .tralbum-wrapper {
        display: grid;
        grid-template-columns: 160px 1fr;
        gap: 18px;
      }

      .art img {
        display: block;
        width: 160px;
        height: 160px;
        object-fit: cover;
        border-radius: 12px;
      }

      .tralbum-wrapper-col1 > * + * {
        margin-top: 8px;
      }

      .tag-line {
        color: #4b5563;
      }

      aside {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="fixture-shell">
      <main>
        <article id="fixture-main-card" class="feed-item">
          <div class="story-title">
            <a class="fan-name" href="https://bandcamp.com/testfan">Test Fan</a>
            bought
            <a
              class="item-link"
              href="https://shop.fixture.example:__PORT__/album/synthetic-release"
              >Synthetic Release</a
            >
          </div>

          <div class="story-innards">
            <div
              class="story-body"
              data-item-json='{"item_id":321,"item_type":"album","item_url":"https://shop.fixture.example:__PORT__/album/synthetic-release"}'
            >
              <div class="tralbum-wrapper">
                <div class="art">
                  <img
                    src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw=="
                    alt="Fixture art"
                  />
                </div>

                <div class="tralbum-wrapper-col1">
                  <a
                    class="item-link"
                    href="https://shop.fixture.example:__PORT__/album/synthetic-release"
                    >Synthetic Release</a
                  >
                  <div>featured track: Track One</div>
                  <div class="tag-line">tags: synthwave, fixture-pop</div>
                  <a
                    class="buy-link"
                    href="https://shop.fixture.example:__PORT__/album/synthetic-release"
                    >buy now</a
                  >
                </div>
              </div>
            </div>
          </div>
        </article>
      </main>

      <aside>
        <article id="fixture-sidebar-card" class="feed-item">
          <div class="story-title">
            <a class="fan-name" href="https://bandcamp.com/sidebarfan"
              >Sidebar Fan</a
            >
            bought
            <a
              class="item-link"
              href="https://shop.fixture.example:__PORT__/album/sidebar-release"
              >Sidebar Release</a
            >
          </div>
          <div class="story-innards">
            <div class="story-body">
              <div class="tralbum-wrapper">
                <div class="art">
                  <img
                    src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw=="
                    alt="Sidebar art"
                  />
                </div>

                <div class="tralbum-wrapper-col1">
                  <a
                    class="item-link"
                    href="https://shop.fixture.example:__PORT__/album/sidebar-release"
                    >Sidebar Release</a
                  >
                  <div>featured track: Ignore Me</div>
                  <a
                    class="buy-link"
                    href="https://shop.fixture.example:__PORT__/album/sidebar-release"
                    >buy now</a
                  >
                </div>
              </div>
            </div>
          </div>
        </article>
      </aside>
    </div>

    <script>
      (() => {
        const canonicalReleaseUrl =
          "https://fixture.bandcamp.com/album/synthetic-release";
        const embeddedPlayerUrl =
          "https://bandcamp.com/EmbeddedPlayer/v=2/album=321/size=large/tracklist=false/artwork=small/";
        const embeddedPlayerHtml = `<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta property="og:url" content="${canonicalReleaseUrl}" />
  </head>
  <body>
    <input id="shareurl" value="${canonicalReleaseUrl}" />
  </body>
</html>`;
        const releaseHtml = `<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Synthetic Release | Fixture Artist</title>
    <meta property="og:site_name" content="Bandcamp" />
    <meta property="og:image" content="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==" />
  </head>
  <body>
    <div
      data-tralbum='{"current":{"title":"Synthetic Release","release_date":"2024-01-02","about":"A synthetic release used to validate the userscript GM bridge.","id":321,"type":"album","band_id":654},"album_title":"Synthetic Release","artist":"Fixture Artist","album_release_date":"2024-01-02","trackinfo":[{"title":"Track One","track_id":"1","file":{"mp3-128":"https://fixture.bandcamp.com/audio/track-one.mp3"},"duration":123,"title_link":"https://fixture.bandcamp.com/track/track-one"},{"title":"Track Two","track_id":"2","file":{"mp3-128":"https://fixture.bandcamp.com/audio/track-two.mp3"},"duration":156,"title_link":"https://fixture.bandcamp.com/track/track-two"}]}'
    ></div>
    <div id="band-name-location">
      <span class="location">Shanghai</span>
    </div>
    <div class="tralbum-about">
      <p>A synthetic release used to validate the userscript GM bridge.</p>
    </div>
  </body>
</html>`;

        const responseBodies = new Map([
          [embeddedPlayerUrl, embeddedPlayerHtml],
          [canonicalReleaseUrl, releaseHtml],
        ]);
        const storage = new Map();

        globalThis.GM_getValue = (key, fallback) =>
          storage.has(key) ? storage.get(key) : fallback;
        globalThis.GM_setValue = (key, value) => {
          storage.set(key, value);
        };
        globalThis.GM_xmlhttpRequest = (options = {}) => {
          const url = String(options.url || "");
          const body = responseBodies.get(url);
          window.setTimeout(() => {
            if (!body) {
              if (typeof options.onerror === "function") {
                options.onerror(new Error(`Unexpected GM request for ${url}`));
              }
              return;
            }
            if (typeof options.onload === "function") {
              options.onload({
                status: 200,
                responseText: body,
              });
            }
          }, 0);
          return {
            abort() {},
          };
        };
      })();
    </script>
    <script src="/dist/bcamplifier.user.js"></script>
  </body>
</html>
