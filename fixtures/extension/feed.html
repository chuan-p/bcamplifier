<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bandcamplifier Extension Fixture</title>
    <style>
      body {
        margin: 0;
        padding: 32px;
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f3f4f6;
        color: #111827;
      }

      .fixture-shell {
        max-width: 860px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 280px;
        gap: 24px;
      }

      .feed-item {
        list-style: none;
        margin: 0;
        padding: 20px;
        min-height: 220px;
        border: 1px solid #d1d5db;
        border-radius: 18px;
        background: #fff;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }

      .story-title {
        margin-bottom: 14px;
        font-size: 16px;
      }

      .story-title a,
      .item-link,
      .buy-link {
        color: #1d4ed8;
      }

      .tralbum-wrapper {
        display: grid;
        grid-template-columns: 160px 1fr;
        gap: 18px;
      }

      .art img {
        display: block;
        width: 160px;
        height: 160px;
        object-fit: cover;
        border-radius: 12px;
      }

      .tralbum-wrapper-col1 > * + * {
        margin-top: 8px;
      }

      .tag-line {
        color: #4b5563;
      }

      aside {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="fixture-shell">
      <main>
        <article id="fixture-main-card" class="feed-item">
          <div class="story-title">
            <a class="fan-name" href="https://bandcamp.com:__PORT__/testfan"
              >Test Fan</a
            >
            bought
            <a
              class="item-link"
              href="https://fixture.bandcamp.com:__PORT__/album/synthetic-release"
              >Synthetic Release</a
            >
          </div>

          <div class="story-innards">
            <div class="story-body">
              <div class="tralbum-wrapper">
                <div class="art">
                  <img
                    src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw=="
                    alt="Fixture art"
                  />
                </div>

                <div class="tralbum-wrapper-col1">
                  <a
                    class="item-link"
                    href="https://fixture.bandcamp.com:__PORT__/album/synthetic-release"
                    >Synthetic Release</a
                  >
                  <div>featured track: Track One</div>
                  <div class="tag-line">tags: synthwave, fixture-pop</div>
                  <a
                    class="buy-link"
                    href="https://fixture.bandcamp.com:__PORT__/album/synthetic-release"
                    >buy now</a
                  >
                </div>
              </div>
            </div>
          </div>
        </article>

        <article id="fixture-delayed-card" class="feed-item">
          <div class="story-title">
            <a class="fan-name" href="https://bandcamp.com:__PORT__/delayedfan"
              >Delayed Fan</a
            >
            bought
            <span class="item-link">Delayed Release</span>
          </div>

          <div class="story-innards">
            <div
              class="story-body"
              data-item-json='{"item_id":321,"item_type":"album","item_url":"https://shop.fixture.example:__PORT__/album/synthetic-release"}'
            >
              <div class="tralbum-wrapper">
                <div class="art">
                  <img
                    src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw=="
                    alt="Delayed fixture art"
                  />
                </div>

                <div class="tralbum-wrapper-col1">
                  <div>featured track: Track One</div>
                  <div class="tag-line">tags: delayed, fixture-pop</div>
                </div>
              </div>
            </div>
          </div>
        </article>
      </main>

      <aside>
        <article id="fixture-sidebar-card" class="feed-item">
          <div class="story-title">
            <a class="fan-name" href="https://bandcamp.com:__PORT__/sidebarfan"
              >Sidebar Fan</a
            >
            bought
            <a
              class="item-link"
              href="https://shop.fixture.example:__PORT__/album/sidebar-release"
              >Sidebar Release</a
            >
          </div>
          <div class="story-innards">
            <div class="story-body">
              <div class="tralbum-wrapper">
                <div class="art">
                  <img
                    src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw=="
                    alt="Sidebar art"
                  />
                </div>

                <div class="tralbum-wrapper-col1">
                  <a
                    class="item-link"
                    href="https://shop.fixture.example:__PORT__/album/sidebar-release"
                    >Sidebar Release</a
                  >
                  <div>featured track: Ignore Me</div>
                  <a
                    class="buy-link"
                    href="https://shop.fixture.example:__PORT__/album/sidebar-release"
                    >buy now</a
                  >
                </div>
              </div>
            </div>
          </div>
        </article>
      </aside>
    </div>

    <script>
      window.setTimeout(() => {
        const delayedColumn = document.querySelector(
          "#fixture-delayed-card .tralbum-wrapper-col1",
        );
        if (!delayedColumn) {
          return;
        }

        const link = document.createElement("a");
        link.className = "item-link";
        link.href = "https://shop.fixture.example:__PORT__/album/synthetic-release";
        link.textContent = "Synthetic Release";
        delayedColumn.insertBefore(link, delayedColumn.firstChild || null);
      }, 250);
    </script>
  </body>
</html>
