<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BC Amplifier Feed Fixture</title>
    <style>
      body {
        margin: 0;
        padding: 32px;
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f3f4f6;
        color: #111827;
      }

      .fixture-shell {
        max-width: 860px;
        margin: 0 auto;
      }

      .story {
        list-style: none;
        margin: 0;
        padding: 20px;
        min-height: 220px;
        border: 1px solid #d1d5db;
        border-radius: 18px;
        background: #fff;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }

      .story-title {
        margin-bottom: 14px;
        font-size: 16px;
      }

      .story-title a,
      .item-link,
      .buy-link {
        color: #1d4ed8;
      }

      .tralbum-wrapper {
        display: grid;
        grid-template-columns: 160px 1fr;
        gap: 18px;
      }

      .art img {
        display: block;
        width: 160px;
        height: 160px;
        object-fit: cover;
        border-radius: 12px;
      }

      .tralbum-wrapper-col1 > * + * {
        margin-top: 8px;
      }

      .tag-line {
        color: #4b5563;
      }
    </style>
  </head>
  <body>
    <div class="fixture-shell">
      <ol>
        <li class="story">
          <div class="story-title">
            <a class="fan-name" href="https://bandcamp.com/testfan">Test Fan</a>
            bought
            <a
              class="item-link"
              href="https://fixture.bandcamp.com/album/synthetic-release"
              >Synthetic Release</a
            >
          </div>

          <div class="story-innards">
            <div class="story-body">
              <div class="tralbum-wrapper">
                <div class="art">
                  <img
                    src="https://dummyimage.com/320x320/d1d5db/111827.png&text=Fixture"
                    alt="Fixture art"
                  />
                </div>

                <div class="tralbum-wrapper-col1">
                  <a
                    class="item-link"
                    href="https://fixture.bandcamp.com/album/synthetic-release"
                    >Synthetic Release</a
                  >
                  <div>featured track: Track One</div>
                  <div class="tag-line">tags: synthwave, fixture-pop</div>
                  <a
                    class="buy-link"
                    href="https://fixture.bandcamp.com/album/synthetic-release"
                    >buy now</a
                  >
                </div>
              </div>
            </div>
          </div>
        </li>
      </ol>
    </div>

    <script>
      (() => {
        const releaseUrl =
          "https://fixture.bandcamp.com/album/synthetic-release";
        const releaseHtml = `<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Synthetic Release | Fixture Artist</title>
    <meta property="og:image" content="https://dummyimage.com/640x640/cbd5e1/111827.png&text=Synthetic+Release" />
  </head>
  <body>
    <div
      data-tralbum='{"current":{"title":"Synthetic Release","release_date":"2024-01-02","about":"A synthetic release used to validate the extension port against a feed fixture.","id":321,"type":"album","band_id":654},"album_title":"Synthetic Release","artist":"Fixture Artist","album_release_date":"2024-01-02","trackinfo":[{"title":"Track One","track_id":"1","file":{"mp3-128":"https://example.com/track-one.mp3"},"duration":123,"title_link":"https://fixture.bandcamp.com/track/track-one"},{"title":"Track Two","track_id":"2","file":{"mp3-128":"https://example.com/track-two.mp3"},"duration":156,"title_link":"https://fixture.bandcamp.com/track/track-two"}]}'
    ></div>
    <div id="band-name-location">
      <span class="location">Shanghai</span>
    </div>
    <div class="tralbum-about">
      <p>A synthetic release used to validate the extension port against a feed fixture.</p>
    </div>
  </body>
</html>`;

        const storage = new Map();

        globalThis.__BCAMPX_HOST__ = {
          kind: "webextension",
          requestHtml: async (url) => {
            if (url === releaseUrl) {
              return releaseHtml;
            }

            throw new Error(`Unexpected fixture request for ${url}`);
          },
          requestJson: async () => {
            throw new Error("requestJson is not used in this fixture");
          },
          storageGet: async (key, fallback) =>
            storage.has(key) ? storage.get(key) : fallback,
          storageSet: async (key, value) => {
            storage.set(key, value);
          },
        };
      })();
    </script>
    <script src="/bcamplifier.user.js"></script>
  </body>
</html>
